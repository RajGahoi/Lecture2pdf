<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lecture2PDF AI — Review</title>
  <style>
    :root {
      --bg: #0a0a10; --panel: #14141f; --panel2: #1b1b2a; --accent: #635bff; --accent-light: #8b85ff;
      --text: #f2f2f7; --text-dim: #9999ad; --ok: #34d399; --err: #f87171; --border: #26263a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    header { padding: 18px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    header h1 { font-size: 17px; margin: 0; display: flex; align-items: center; gap: 8px; }
    header h1::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); display: inline-block; }
    header .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .stats { display: flex; gap: 20px; align-items: center; }
    .stat { text-align: right; }
    .stat .num { font-size: 22px; font-weight: 700; color: var(--accent-light); line-height: 1; }
    .stat .label { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }

    main { padding: 22px 28px 60px; max-width: 1100px; margin: 0 auto; }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 20px; }
    .panel-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
    .panel-hint { font-size: 11.5px; color: var(--text-dim); margin: 0 0 14px; line-height: 1.5; }

    #chartWrap { position: relative; cursor: ns-resize; user-select: none; }
    #chartSvg { width: 100%; height: 180px; display: block; }
    .threshold-readout { position: absolute; top: 4px; left: 6px; font-size: 11px; color: var(--accent-light); font-weight: 600; background: rgba(20,20,31,0.85); padding: 3px 7px; border-radius: 5px; pointer-events: none; }

    .gallery-toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .gallery-toolbar button { padding: 7px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 11.5px; cursor: pointer; }
    .gallery-toolbar button:hover { border-color: var(--accent); }

    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
    .thumb { position: relative; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); cursor: pointer; background: var(--panel2); transition: border-color 0.12s, opacity 0.12s; }
    .thumb.included { border-color: var(--accent); }
    .thumb.excluded { opacity: 0.35; }
    .thumb img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
    .thumb .badge { position: absolute; bottom: 4px; left: 4px; font-size: 9.5px; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; }
    .thumb .check { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; border-radius: 4px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; opacity: 0; }
    .thumb.included .check { opacity: 1; }

    .bottom-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 16px 28px; display: flex; justify-content: center; gap: 12px; margin: 0 -28px; }
    button.primary { padding: 13px 28px; border: none; border-radius: 10px; background: var(--accent); color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
    button.primary:hover { opacity: 0.9; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading, .error-box { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .error-box { color: var(--err); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Lecture2PDF AI — Review</h1>
      <div class="subtitle" id="videoTitle">Loading…</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="includedCount">0</div><div class="label">slides selected</div></div>
      <div class="stat"><div class="num" id="totalCount">0</div><div class="label">samples scanned</div></div>
    </div>
  </header>

  <main id="main">
    <div class="loading" id="loadingState">Loading scan results…</div>
  </main>

  <script src="review.js"></script>
</body>
</html>
